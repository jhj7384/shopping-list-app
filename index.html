<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 480px;
      padding: 32px 24px;
      height: fit-content;
    }

    h1 {
      font-size: 24px;
      color: #1a1a2e;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4361ee;
    }

    .input-row button {
      padding: 12px 20px;
      background: #4361ee;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover { background: #3a56d4; }

    .count {
      font-size: 13px;
      color: #888;
      margin-bottom: 12px;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 8px;
      border-bottom: 1px solid #f0f0f0;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    li:last-child { border-bottom: none; }

    li input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #4361ee;
      cursor: pointer;
      flex-shrink: 0;
    }

    li .item-text {
      flex: 1;
      font-size: 15px;
      color: #333;
      transition: all 0.2s;
      word-break: break-word;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #aaa;
    }

    li .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    li .delete-btn:hover {
      color: #e74c3c;
      background: #fef2f2;
    }

    .empty {
      text-align: center;
      color: #bbb;
      padding: 40px 0;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>쇼핑 리스트</h1>
    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템을 입력하세요" />
      <button onclick="addItem()">추가</button>
    </div>
    <div class="count" id="count"></div>
    <ul id="list"></ul>
    <div class="empty" id="empty">리스트가 비어 있습니다</div>
  </div>

  <script>
    const listEl = document.getElementById('list');
    const inputEl = document.getElementById('itemInput');
    const emptyEl = document.getElementById('empty');
    const countEl = document.getElementById('count');

    let items = JSON.parse(localStorage.getItem('shoppingList') || '[]');

    function save() {
      localStorage.setItem('shoppingList', JSON.stringify(items));
    }

    function render() {
      listEl.innerHTML = '';
      items.forEach((item, i) => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');
        li.innerHTML = `
          <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="toggle(${i})" />
          <span class="item-text">${escapeHtml(item.name)}</span>
          <button class="delete-btn" onclick="remove(${i})">&times;</button>
        `;
        listEl.appendChild(li);
      });

      emptyEl.style.display = items.length ? 'none' : 'block';

      const done = items.filter(i => i.checked).length;
      countEl.textContent = items.length
        ? `${done} / ${items.length} 완료`
        : '';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function addItem() {
      const name = inputEl.value.trim();
      if (!name) return;
      items.push({ name, checked: false });
      inputEl.value = '';
      inputEl.focus();
      save();
      render();
    }

    function toggle(index) {
      items[index].checked = !items[index].checked;
      save();
      render();
    }

    function remove(index) {
      items.splice(index, 1);
      save();
      render();
    }

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addItem();
    });

    render();
  </script>
</body>
</html>
